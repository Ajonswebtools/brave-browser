name: Build Patched Brave

on:
  workflow_dispatch:

concurrency:
  group: brave-patched-build-${{ github.run_id }}
  cancel-in-progress: false

env:
  BRAVE_CORE_REF: master
  DEPOT_TOOLS_WIN_TOOLCHAIN: 0
  USE_BRAVE_HERMETIC_TOOLCHAIN: 0
  PYTHONUNBUFFERED: 1

jobs:
  build-windows-x64:
    runs-on: windows-2022
    timeout-minutes: 600
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout DMask repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.PAT_TOKEN }}

      - name: Maximize disk space
        run: |
          $ErrorActionPreference = 'Continue'

          function Remove-IfExists {
            param([string]$PathToRemove)
            if ([string]::IsNullOrWhiteSpace($PathToRemove)) {
              return
            }
            if (Test-Path -LiteralPath $PathToRemove) {
              Write-Host "Removing $PathToRemove"
              Remove-Item -LiteralPath $PathToRemove -Recurse -Force -ErrorAction SilentlyContinue
            }
          }

          $targets = @(
            'C:\Program Files\Android',
            'C:\Android',
            'C:\ProgramData\chocolatey\lib\android-sdk',
            'C:\hostedtoolcache\windows\CodeQL',
            'C:\hostedtoolcache\windows\Ruby',
            'C:\hostedtoolcache\windows\PyPy',
            "$env:USERPROFILE\.cargo",
            "$env:USERPROFILE\.ghcup",
            "$env:USERPROFILE\AppData\Local\Android",
            'C:\Windows\SoftwareDistribution\Download'
          )

          foreach ($target in $targets) {
            Remove-IfExists -PathToRemove $target
          }

          if (Get-Command docker -ErrorAction SilentlyContinue) {
            docker system prune -af --volumes | Out-Host
          }

      - name: Show available disk space after cleanup
        run: |
          [System.IO.DriveInfo]::GetDrives() |
            Where-Object { $_.DriveType -eq 'Fixed' -and $_.IsReady } |
            ForEach-Object {
              [PSCustomObject]@{
                Drive = $_.Name
                FreeGB = [math]::Round($_.AvailableFreeSpace / 1GB, 2)
                TotalGB = [math]::Round($_.TotalSize / 1GB, 2)
              }
            } |
            Format-Table -AutoSize

      - name: Install depot_tools
        run: |
          git clone https://chromium.googlesource.com/chromium/tools/depot_tools.git C:\depot_tools
          'C:\depot_tools' | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          $env:PATH = "C:\depot_tools;$env:PATH"
          gclient --version

      - name: Configure Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create brave source directory
        run: |
          New-Item -ItemType Directory -Force C:\brave | Out-Null
          Set-Location C:\brave

          # Write the .gclient config manually
          @'
          solutions = [
            {
              "name": "src",
              "url": "https://chromium.googlesource.com/chromium/src.git",
              "managed": False,

              "custom_deps": {},
              
              "custom_vars": {
                "checkout_pgo_profiles": False,
                "checkout_configuration": "minimal",
                "checkout_nacl": False,
                "checkout_android": False,
                "checkout_chromeos": False,
                "checkout_cast": False,
                "checkout_ios": False,
                "checkout_fuchsia": False,
                "checkout_linux": False,
                "checkout_mac": False,
                "checkout_traffic_annotation_tools": False,
                "checkout_fuzzer_corpus": False,
              },
            },
            {
              "name": "src/brave",
              "url": "https://github.com/brave/brave-core.git",
              "managed": False,
              "custom_deps": {},
            },
          ]
          target_os = ["win"]
          target_cpu = ["x64"]
          '@ | Set-Content -Path C:\brave\.gclient -Encoding ascii

          Write-Host "=== .gclient written ==="
          Get-Content C:\brave\.gclient

      - name: Configure git for lean sync
        run: |
          git config --global core.autocrlf false
          git config --global core.filemode false
          git config --global core.fscache true
          git config --global core.preloadindex true
          git config --global fetch.parallel 4

      - name: Sync brave source with gclient
        timeout-minutes: 240
        run: |
          $env:PATH = "C:\depot_tools;$env:PATH"
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          $env:GIT_CACHE_PATH = "C:\gitcache"
          $env:GCLIENT_PY3 = "1"
          $env:DEPOT_TOOLS_UPDATE = "0"
          $env:GIT_CONFIG_COUNT = "2"
          $env:GIT_CONFIG_KEY_0 = "fetch.noTags"
          $env:GIT_CONFIG_VALUE_0 = "true"
          $env:GIT_CONFIG_KEY_1 = "remote.origin.tagOpt"
          $env:GIT_CONFIG_VALUE_1 = "--no-tags"
          Set-Location C:\brave

          # Write a .gitconfig that disables tag fetching globally
          @'
          [fetch]
              noTags = true
          [remote "origin"]
              tagOpt = --no-tags
          '@ | Set-Content -Path "$env:USERPROFILE\.gitconfig" -Encoding ascii

          gclient sync `
            --no-history `
            --shallow `
            --reset `
            --delete_unversioned_trees `
            --nohooks `
            -v

      - name: Apply DMask farbling patch
        run: |
          $scriptPath = Join-Path $env:GITHUB_WORKSPACE 'docs\apply_farbling_patch.ps1'
          if (-not (Test-Path $scriptPath)) {
            throw "Patch script not found at $scriptPath"
          }
          & $scriptPath

      - name: Run Chromium hooks
        timeout-minutes: 30
        run: |
          $env:PATH = "C:\depot_tools;$env:PATH"
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          $sdkBin = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.17763.0\x64"
          if (Test-Path $sdkBin) { $env:PATH = "$sdkBin;$env:PATH" }
          Set-Location C:\brave

          # VS toolchain setup
          python3 src/build/vs_toolchain.py update --force
          if ($LASTEXITCODE -ne 0) {
            Write-Host "[WARNING] vs_toolchain update failed, continuing"
          }

          # Verify gn is available
          gn --version

          # Generate LASTCHANGE (git hash info)
          Set-Location C:\brave\src
          python3 build/util/lastchange.py -o build/util/LASTCHANGE
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to generate LASTCHANGE"
          }

          # Generate LASTCHANGE.committime (Unix timestamp integer)
          $timestamp = git -C C:\brave\src log -1 --format="%ct"
          $timestamp | Set-Content build/util/LASTCHANGE.committime -Encoding ascii -NoNewline
          Write-Host "LASTCHANGE.committime = $timestamp"

          # Verify it is a valid integer
          $parsed = [int64]$timestamp
          Write-Host "Verified as integer: $parsed"

     
      - name: Generate missing build files
        run: |
          $env:PATH = "C:\depot_tools;$env:PATH"
          Set-Location C:\brave\src
        
          # DAWN_VERSION must contain a 40-character git hash
          $dawnVersion = "C:\brave\src\gpu\webgpu\DAWN_VERSION"
          $dawnDir = "C:\brave\src\third_party\dawn"
        
          # Get the actual git hash of the Dawn submodule
          $hash = git -C $dawnDir rev-parse HEAD 2>$null
          if ($hash -and $hash.Length -eq 40) {
            $hash | Set-Content $dawnVersion -Encoding ascii -NoNewline
            Write-Host "DAWN_VERSION set to: $hash"
          } else {
            throw "Could not get Dawn git hash. Got: $hash"
          }
          Get-Content $dawnVersion

      - name: Configure build
        run: |
          Set-Location C:\brave\src
          New-Item -ItemType Directory -Force -Path out\Release_x64 | Out-Null
          @'
          is_debug = false
          is_official_build = true
          target_cpu = "x64"
          brave_channel = "release"
          enable_nacl = false
          symbol_level = 0
          enable_resource_allowlist_generation = false
          chrome_pgo_phase = 0
          use_thin_lto = false
          windows_sdk_version = "10.0.17763.0"
          '@ | Set-Content -Path out\Release_x64\args.gn -Encoding ascii
          gn gen out/Release_x64

      - name: Fix devtools-frontend rollup native module
        run: |
          $devtoolsPath = "C:\brave\src\third_party\devtools-frontend\src"
          $rollupPackageJson = Join-Path $devtoolsPath "node_modules\rollup\package.json"

          if (-not (Test-Path $rollupPackageJson)) {
            throw "Rollup package.json not found: $rollupPackageJson"
          }

          $rollupVersion = (Get-Content $rollupPackageJson -Raw | ConvertFrom-Json).version
          Write-Host "Detected Rollup version: $rollupVersion"

          $rollupDest = Join-Path $devtoolsPath "node_modules\@rollup\rollup-win32-x64-msvc"

          if (Test-Path $rollupDest) {
            Remove-Item -Recurse -Force $rollupDest -ErrorAction SilentlyContinue
          }

          $tempPath = "C:\rollup-native-temp"
          Remove-Item -Recurse -Force $tempPath -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $tempPath | Out-Null
          Set-Location $tempPath

          Write-Host "Downloading matching Rollup native package..."
          npm pack "@rollup/rollup-win32-x64-msvc@$rollupVersion"

          $tgz = Get-ChildItem *.tgz | Select-Object -First 1
          if (-not $tgz) {
            throw "Rollup package tarball was not downloaded"
          }

          tar -xf $tgz.FullName

          New-Item -ItemType Directory -Force (Split-Path $rollupDest) | Out-Null
          Copy-Item -Recurse -Force "$tempPath\package" $rollupDest

          if (Test-Path $rollupDest) {
            Write-Host "SUCCESS: matching @rollup/rollup-win32-x64-msvc@$rollupVersion copied"
          } else {
            throw "FAILED: @rollup/rollup-win32-x64-msvc still not found"
          }

      - name: Copy rc.exe to path expected by rc.py
        timeout-minutes: 5
        run: |
          $rcTarget = "C:\brave\src\build\toolchain\win\rc\win\rc.exe"
          $rcSource = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.26100.0\x64\rc.exe"
          if (-not (Test-Path $rcSource)) {
            throw "rc.exe not found at expected location: $rcSource"
          }
          New-Item -ItemType Directory -Force -Path (Split-Path $rcTarget) | Out-Null
          Copy-Item -Path $rcSource -Destination $rcTarget -Force
          if (Test-Path $rcTarget) {
            Write-Host "VERIFIED: rc.exe copied from $rcSource to $rcTarget"
            (Get-Item $rcTarget).Length
          } else {
            throw "FAILED: rc.exe copy did not succeed"
          }

      - name: Diagnose Windows SDK versions
        timeout-minutes: 5
        run: |
          Write-Host "=== All rc.exe files found ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "rc.exe" -ErrorAction SilentlyContinue | Select-Object FullName

          Write-Host "=== Windows SDK bin directories ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -ErrorAction SilentlyContinue | Select-Object Name

          Write-Host "=== Windows SDK include directories ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\include" -ErrorAction SilentlyContinue | Select-Object Name

          Write-Host "=== VS toolchain json ==="
          if (Test-Path "C:\brave\src\build\win_toolchain.json") {
            Get-Content "C:\brave\src\build\win_toolchain.json"
          } else {
            Write-Host "win_toolchain.json not found"
          }
      - name: Build installer
        timeout-minutes: 360
        run: |
          $env:PATH = "C:\depot_tools;$env:PATH"
          $env:DEPOT_TOOLS_WIN_TOOLCHAIN = "0"
          $sdkBin = "C:\Program Files (x86)\Windows Kits\10\bin\10.0.17763.0\x64"
          if (-not (Test-Path $sdkBin)) {
            $rc = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "rc.exe" -ErrorAction SilentlyContinue | Where-Object { $_.FullName -match "x64" } | Select-Object -First 1
            if ($rc) { $sdkBin = $rc.DirectoryName }
          }
          Write-Host "Using SDK bin: $sdkBin"
          $env:PATH = "$sdkBin;$env:PATH"
          Set-Location C:\brave\src
          autoninja -C out\Release_x64 mini_installer

      - name: Upload patched Brave installer
        uses: actions/upload-artifact@v4
        with:
          name: brave-patched-windows-x64
          path: |
            C:\brave\src\out\Release_x64\mini_installer.exe
            C:\brave\src\out\Release_x64\BraveBrowserSetup*.exe
            C:\brave\src\out\Release_x64\brave_installer*.exe
          if-no-files-found: warn
          retention-days: 7

      - name: Auto-diagnose build failure
        if: failure()
        timeout-minutes: 10
        run: |
          Write-Host "=========================================="
          Write-Host "AUTO DIAGNOSIS REPORT"
          Write-Host "=========================================="

          Write-Host "`n=== LAST BUILD ERROR ==="
          $logs = Get-ChildItem -Path C:\brave\src\out\Release_x64 -Filter *.log -Recurse -ErrorAction SilentlyContinue
          foreach ($log in $logs) {
            Write-Host "--- $($log.FullName) ---"
            Get-Content $log.FullName -Tail 50
          }

          Write-Host "`n=== ALL RC.EXE LOCATIONS ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "rc.exe" -ErrorAction SilentlyContinue | Select-Object FullName

          Write-Host "`n=== ALL ML64.EXE LOCATIONS ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "ml64.exe" -ErrorAction SilentlyContinue | Select-Object FullName
          Get-ChildItem -Path "C:\Program Files\Microsoft Visual Studio" -Recurse -Filter "ml64.exe" -ErrorAction SilentlyContinue | Select-Object FullName

          Write-Host "`n=== WINDOWS SDK BIN VERSIONS INSTALLED ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -ErrorAction SilentlyContinue | Select-Object Name

          Write-Host "`n=== WINDOWS SDK INCLUDE VERSIONS INSTALLED ==="
          Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\include" -ErrorAction SilentlyContinue | Select-Object Name

          Write-Host "`n=== WIN TOOLCHAIN JSON ==="
          if (Test-Path "C:\brave\src\build\win_toolchain.json") {
            Get-Content "C:\brave\src\build\win_toolchain.json"
          } else {
            Write-Host "win_toolchain.json not found"
          }

          Write-Host "`n=== ENVIRONMENT.X64 CONTENTS ==="
          $envFile = "C:\brave\src\out\Release_x64\environment.x64"
          if (Test-Path $envFile) {
            $content = Get-Content $envFile -Raw
            $lines = $content -split "`n"
            foreach ($line in $lines) {
              if ($line.Trim() -ne "") {
                Write-Host $line
              }
            }
          } else {
            Write-Host "environment.x64 not found"
          }

          Write-Host "`n=== RC.PY FIRST 30 LINES ==="
          $rcPy = "C:\brave\src\build\toolchain\win\rc\rc.py"
          if (Test-Path $rcPy) {
            Get-Content $rcPy | Select-Object -First 30
          }

          Write-Host "`n=== RC.PY WIN DIRECTORY CONTENTS ==="
          $rcWinDir = "C:\brave\src\build\toolchain\win\rc\win"
          if (Test-Path $rcWinDir) {
            Get-ChildItem $rcWinDir | Select-Object Name, Length
          } else {
            Write-Host "rc\win directory does not exist"
          }

          Write-Host "`n=== DISK SPACE ==="
          [System.IO.DriveInfo]::GetDrives() |
            Where-Object { $_.DriveType -eq 'Fixed' -and $_.IsReady } |
            ForEach-Object {
              [PSCustomObject]@{
                Drive = $_.Name
                FreeGB = [math]::Round($_.AvailableFreeSpace / 1GB, 2)
                TotalGB = [math]::Round($_.TotalSize / 1GB, 2)
              }
            } | Format-Table -AutoSize

          Write-Host "`n=== VS TOOLCHAIN PATH ==="
          python3 C:\brave\src\build\vs_toolchain.py get_toolchain_dir 2>&1

          Write-Host "=========================================="
          Write-Host "END OF AUTO DIAGNOSIS REPORT"
          Write-Host "=========================================="

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            C:\brave\src\out\Release_x64\*.log
            C:\brave\src\out\Release_x64\**\*.log
          if-no-files-found: warn
          retention-days: 7
